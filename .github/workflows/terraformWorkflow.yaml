name: terraform || azure-resources || deployment

run-name: run-by user-${{ github.actor }} from branch-${{ github.ref_name }} with run-id-${{ github.run_id }} with workflow#${{ github.run_number }}

on:
  push:
    branches:
      - main
  pull_request:
    branches: 
      - main
  workflow_dispatch:

env:
  working-directory: ./terraform

jobs:
  terraform-security-scan:
    name: Terraform Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Tflint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: Tflint Scan
        id: tflint
        run: |
          tflint --version
          tflint --chdir=${{ env.working-directory }} --init
          tflint --chdir=${{ env.working-directory }}

      - name: Tfsec Scan
        id: tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ${{ env.working-directory }}
          version: latest
          additional_args: --tfvars-file=${{ env.working-directory }}/terraform.tfvars
          soft_fail: true

      - name: Checkov Scan
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.working-directory }}
          framework: terraform
          var_file: terraform.tfvars
          output_format: cli
          soft_fail: true

  terraform-fmt-validate:
    name: Terraform Fmt and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: latest

      - name: Terraform Init
        id: init
        run: terraform init -input=false
        working-directory: ${{ env.working-directory }}

      - name: Terraform Fmt
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: ${{ env.working-directory }}

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        working-directory: ${{ env.working-directory }}

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs:
      - terraform-security-scan
      - terraform-fmt-validate

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: latest

      - name: Terraform Init
        id: init
        run: terraform init -input=false
        working-directory: ${{ env.working-directory }}

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan
        working-directory: ${{ env.working-directory }}

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.working-directory }}/tfplan

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: latest

      - name: Download Terraform Plan
        uses: actions/download-artifact@v8
        with:
          name: terraform-plan
          path: ${{ env.working-directory }}

      - name: Terraform Init
        id: init
        run: terraform init -input=false
        working-directory: ${{ env.working-directory }}

      - name: Terraform Apply
        id: apply
        run: terraform apply tfplan
        working-directory: ${{ env.working-directory }}
